version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: food-delivery-db
    restart: always
    environment:
      MYSQL_DATABASE: food_delivery
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: food_user
      MYSQL_PASSWORD: food_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: food-delivery-backend
    restart: always
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/food_delivery?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=food_user
      - SPRING_DATASOURCE_PASSWORD=food_password
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: food-delivery-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
